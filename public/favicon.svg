  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" stroke="#e05555" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Inner diamond / flame shape -->
  <polygon points="16,5 22,13 16,27 10,13" fill="#e05555" opacity="0.85"/>
  <!-- Cross guard -->
